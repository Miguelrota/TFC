<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inteco – Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #1b2d5b;
      --blue: #2d6ecc;
      --sky: #4fa3e0;
      --light-sky: #a8d4f0;
      --white: #ffffff;
      --gray-bg: #f0f4fa;
      --gray-text: #7a8ba8;
      --error: #e05c5c;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin: 0;
      padding: 0;
    }

    #fondo-bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: background-image 0.4s ease;
      border-radius: 12px;
      /* respeta las esquinas redondeadas de la ventana */
      overflow: hidden;
    }

    /* Card */
    .card {
      position: relative;
      background: var(--white);
      border-radius: 28px;
      width: 420px;

      padding: 48px 44px 40px;
      padding-top: 110px;
      box-shadow:
        0 4px 6px rgba(27, 45, 91, 0.04),
        0 20px 60px rgba(27, 45, 91, 0.12),
        0 0 0 1px rgba(27, 45, 91, 0.06);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Decorative top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(90deg, var(--navy), var(--sky));
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-wrap img {
      height: 52px;
      object-fit: contain;
    }

    /* Headline */
    .headline {
      text-align: center;
      margin-bottom: 32px;
    }

    .headline h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }

    .headline p {
      font-size: 13.5px;
      color: var(--gray-text);
      font-weight: 400;
    }

    /* Form fields */
    .field {
      margin-bottom: 18px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .field:nth-child(1) {
      animation-delay: 0.1s;
    }

    .field:nth-child(2) {
      animation-delay: 0.18s;
    }

    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .input-wrap input:focus~svg,
    .input-wrap input:not(:placeholder-shown)~svg {
      opacity: 0.7;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid #dce5f0;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--navy);
      background: #f8fafd;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: #b8c8dc;
    }

    input:focus {
      border-color: var(--sky);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 163, 224, 0.12);
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(45, 110, 204, 0.35);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(45, 110, 204, 0.42);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.12));
      pointer-events: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #dce5f0;
    }

    .divider span {
      font-size: 12px;
      color: var(--gray-text);
      font-weight: 500;
    }

    /* Connection config button */
    .btn-config {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--navy);
      border: 1.5px solid #dce5f0;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
    }

    .btn-config:hover {
      border-color: var(--sky);
      background: #f0f8ff;
      color: var(--blue);
    }

    /* Footer */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--gray-text);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
    }

    .card-footer a {
      color: var(--blue);
      text-decoration: none;
    }

    .card-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Menú contextual botón derecho -->
    <div id="ctx-menu" style="
      display:none; position:fixed; z-index:9999;
      background:#fff; border-radius:10px;
      box-shadow:0 8px 30px rgba(27,45,91,0.18), 0 0 0 1px rgba(27,45,91,0.08);
      padding:6px; min-width:170px;
      animation: fadeUp 0.15s ease both;
    ">
      <button onclick="changeFondo()" style="
        width:100%; text-align:left; border:none; background:none;
        padding:9px 14px; border-radius:7px; cursor:pointer;
        font-family:'Outfit',sans-serif; font-size:13px; font-weight:500;
        color:#1b2d5b; display:flex; align-items:center; gap:9px;
        transition:background 0.15s;
      " onmouseover="this.style.background='#f0f4fa'" onmouseout="this.style.background='none'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        Cambiar fondo
      </button>
    </div>
    <!-- Botón cerrar ventana -->
    <button onclick="window.api.send('login-close')" style="
      position:absolute; top:14px; right:14px;
      width:30px; height:30px; border-radius:50%;
      border:none; background:rgba(27,45,91,0.07);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:#7a8ba8; font-size:16px; line-height:1;
      transition:background 0.15s;
      -webkit-app-region: no-drag;
    " onmouseover="this.style.background='rgba(224,92,92,0.12)';this.style.color='#e05c5c'"
      onmouseout="this.style.background='rgba(27,45,91,0.07)';this.style.color='#7a8ba8'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>

    <!-- Espacio superior -->
    <div style="height: 60px;"></div>

    <!-- Headline -->
    <div class="headline">
      <h1>Bienvenido</h1>
      <p>Accede a tu cuenta para continuar</p>
    </div>

    <!-- Form -->
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="usuario" autocomplete="username" required>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          <svg id="eye-icon" onclick="togglePassword()" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="cursor:pointer; right:12px; pointer-events:all;">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
      </div>

      <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>

    <div class="divider"><span>o</span></div>

    <button class="btn-config" onclick="openConfig()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
      Configurar conexión
    </button>

  </div>

  <script>

    // ── Drag manual de ventana ──────────────────────────────────
    (function () {
      let dragging = false;
      let startX, startY;

      document.querySelector('.card').addEventListener('mousedown', (e) => {
        if (e.target.closest('input, button, a, select, textarea, label')) return;
        dragging = true;
        startX = e.screenX;
        startY = e.screenY;
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const deltaX = e.screenX - startX;
        const deltaY = e.screenY - startY;
        startX = e.screenX;
        startY = e.screenY;
        window.api.send('window-move', { deltaX, deltaY });
      });

      document.addEventListener('mouseup', () => { dragging = false; });
      document.addEventListener('dblclick', e => e.stopPropagation());
    })();

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function showError(msg) {
      let errEl = document.getElementById('login-error');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = 'login-error';
        errEl.style.cssText = 'color:var(--error);font-size:13px;text-align:center;margin-top:10px;min-height:18px;';
        document.querySelector('.btn-login').insertAdjacentElement('afterend', errEl);
      }
      errEl.textContent = msg;
      setTimeout(() => { errEl.textContent = ''; }, 4000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-login');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Introduce usuario y contraseña');
        return;
      }

      btn.textContent = 'Accediendo...';
      btn.style.opacity = '0.8';
      btn.disabled = true;

      try {
        const res = await window.api.invoke('auth:login', { user: username, password });
        if (res.ok) {
          window.api.send('login-success');
        } else {
          showError(res.error || 'Usuario o contraseña incorrectos');
          btn.textContent = 'Iniciar sesión';
          btn.style.opacity = '1';
          btn.disabled = false;
        }
      } catch (err) {
        showError('Error de conexión. Revisa la configuración.');
        btn.textContent = 'Iniciar sesión';
        btn.style.opacity = '1';
        btn.disabled = false;
      }
    }

    function openConfig() {
      window.api.send('open-conexion');
    }

    const ctxMenu = document.getElementById('ctx-menu');

    document.querySelector('.card').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ctxMenu.style.display = 'block';
      const menuW = 180;
      const menuH = 46;
      const x = (e.clientX + menuW > window.innerWidth) ? e.clientX - menuW : e.clientX;
      const y = (e.clientY + menuH > window.innerHeight) ? e.clientY - menuH : e.clientY;
      ctxMenu.style.left = x + 'px';
      ctxMenu.style.top = y + 'px';
    });

    document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });

    async function changeFondo() {
      ctxMenu.style.display = 'none';
      const res = await window.api.invoke('dialog:openFondo');
      if (!res || !res.filePath) return;
      aplicarFondo(res.filePath);
      window.api.invoke('config:setFondo', { fondo: res.filePath });
    }

    function aplicarFondo(filePath) {
      if (!filePath) return;
      const card = document.querySelector('.card');
      const url = 'file:///' + filePath.replace(/\\/g, '/');
      card.style.backgroundImage = `url("${url}")`;
      card.style.backgroundSize = 'cover';
      card.style.backgroundPosition = 'center';
    }

    async function loadFondo() {
      try {
        const res = await window.api.invoke('config:getFondo');
        if (res && res.fondo) aplicarFondo(res.fondo);
      } catch (e) { }
    }

    loadFondo();
  </script>
</body>

</html>
